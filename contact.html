
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    
   
    <link rel="stylesheet" href="styles.css">
    
    <style>
        .contact-container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .contact-form {
            background-color: #559085;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            color: #272f3e;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #4f9365;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #49647a;
        }
        
        .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #47ad69;
            border-radius: 4px;
            font-size: 16px;
            min-height: 120px;
            resize: vertical;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        .form-textarea:focus {
            outline: none;
            border-color: #3ab836;
        }
        
        .submit-btn {
            background-color: #4299e1;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        
        .submit-btn:hover {
            background-color: #3182ce;
        }
        
        .contact-info {
            text-align: center;
            margin-top: 30px;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2 class="logo">My Portfolio</h2>
            <ul class="nav-links">
                <li><a href="index.html">About</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="interest.html">Interests</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Contact Me</h1>
            <p style="text-align: center; color: #4a5568;">How can you reach me?</p>
        </header>

        <div class="contact-container">
            
            <div class="contact-form">
                <form>
                    
                    <div class="form-group">
                        <label class="form-label" for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-input" placeholder="Your full name">
                    </div>
                    
                  
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="your.email@example.com">
                    </div>
                    
                   
                    <div class="form-group">
                        <label class="form-label" for="message">Message</label>
                        <textarea id="message" name="message" class="form-textarea" placeholder="Write your message here..."></textarea>
                    </div>
                    
                    <button type="button" class="submit-btn">Send Message</button>
                </form>
            </div>

            <div class="contact-info">
                <p><strong>Email:</strong> shaswotxtha23@gmail.com</p>
                <p><strong>Phone:</strong> +977 9800000000</p>
            </div>
        </div>
    </main>  
</body>
</html>
