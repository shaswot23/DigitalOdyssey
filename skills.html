<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Skills</title>
    

    <link rel="stylesheet" href="styles.css">
    
    <style>
        .skills-container {
            max-width: 900px;
            margin: 30px auto;
        }
        
        .skill-category {
            background-color: #506f7c;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 8px;
        }
        
        .skill-category h3 {
            color: #2c5282;
            border-bottom: 3px solid #4299e1;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        
        .skill-list {
            list-style: none;
            padding: 0;
        }
        
        .skill-item {
            background-color: #f7fafc;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #4299e1;
            border-radius: 4px;
        }
        
        .skill-name {
            font-weight: bold;
            color: #2d3748;
            font-size: 18px;
        }
        
        .skill-level {
            color: #718096;
            font-size: 14px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-container">
            <h2 class="logo">My Portfolio</h2>
            <ul class="nav-links">
                <li><a href="index.html">About</a></li>
                <li><a href="skills.html" class="active">Skills</a></li>
                <li><a href="interest.html">Interests</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </div>
    </nav>

   
    <main class="container">
        <header class="page-header">
            <h1>My Skills</h1>
            <p style="text-align: center; color: #4a5568;">Here are the skills and expertise I've developed and I'm learning:</p>
        </header>

        <div class="skills-container">
            
            <div class="skill-category">
                <h3>Programming & Development</h3>
                <ul class="skill-list">
                    <li class="skill-item">
                       <span style="color: #333;">HTML</span>
                        <span class="Beginner" style="background-color: #ffffff; padding: 4px 12px; border-radius: 12px;"></span>
                    </li>
                    <li class="skill-item">
                        <span style="color: #333;">CSS</span>
                        <span class="Beginner" style="background-color: #ffffff; padding: 4px 12px; border-radius: 12px;"></span>
                    </li>
                    <li class="skill-item">
                        <span style="color: #333;">C Programming</span>
                        <span class="Intermediate" style="background-color: #ffffff; padding: 4px 12px; border-radius: 12px;"></span>
                    </li>
                </ul>
            </div>

            <div class="skill-category">
                <h3>Designing</h3>
                <ul class="skill-list">
                    <li class="skill-item">
                        <span style="color: #333;">Canva Design</span>
                        <span class="Beginner" style="background-color: #ffffff; padding: 4px 12px; border-radius: 12px;"></span>
                    </li>
                    
                </ul>
            </div>

           
            <div class="skill-category">
                <h3>Communication</h3>
                <ul class="skill-list">
                    <li class="skill-item">
                        <span style="color: #333;">Mass Speaking</span>
                        <span class="Learning" style="background-color: #ffffff; padding: 4px 12px; border-radius: 12px;"></span>
                    </li>
                    <li class="skill-item">
                        <span style="color: #333;">Team Collaboration</span>
                        <span class="Basic" style="background-color: #ffffff; padding: 4px 12px; border-radius: 12px;"></span>
                    </li>
                </ul>
        </div>
    </main>
</body>
</html>
